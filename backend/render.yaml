services:
  - type: web
    name: code-grammerizer-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: CEREBRAS_API_KEY      # gpt-oss -> review + insights
        sync: false
      - key: MISTRAL_API_KEY       # codestral -> code writing + docs
        sync: false
      - key: GROQ_API_KEY          # fallback provider
        sync: false
      - key: GITHUB_TOKEN          # optional, private repo pulls only
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
