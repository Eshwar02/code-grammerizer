<svg xmlns="http://www.w3.org/2000/svg" width="360" height="60" viewBox="0 0 360 60" role="img" aria-label="code-grammerizer">
  <title>code-grammerizer</title>

  <!-- Static wordmark for the README.
       GitHub proxies README images through camo, which strips SMIL/CSS
       animation, so this renders the full brand statically instead of an
       animation that would freeze mid-frame. The live collapse->expand
       hover animation lives in the app navbar and in cg-logo.html. -->

  <!-- Background pill: light so dark ink letters read in GitHub dark mode -->
  <rect x="1" y="10" width="358" height="40" rx="12" ry="12" fill="#F2F0EA"/>

  <text x="180" y="39" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif" font-weight="800" font-size="26"
        style="letter-spacing:0.2px">
    <tspan fill="#0F7B1F">&lt;</tspan><tspan fill="#14110E">code</tspan><tspan fill="#0F7B1F">-</tspan><tspan fill="#14110E">grammerizer</tspan><tspan fill="#0F7B1F">/&gt;</tspan>
  </text>
</svg>
