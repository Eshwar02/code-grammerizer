name: keep-warm

# Pings the backend /health endpoint on a schedule so Render's free-tier web
# service never spins down. A warm container means no ~30-60s cold start (and
# no "database is slow" first request) when someone opens the app after idle.
#
# Override the target by setting a repo variable named HEALTH_URL
# (Settings -> Secrets and variables -> Actions -> Variables).

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub's minimum granularity is 5)
  workflow_dispatch:          # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.HEALTH_URL || 'https://code-grammerizer-api.onrender.com/health' }}"
          echo "Pinging $URL"
          # Retry a few times: a cold container may take up to ~60s to answer.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 "$URL" || echo 000)
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is warm."
              exit 0
            fi
            sleep 15
          done
          echo "Health check did not return 200 after retries."
          exit 1
